<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driply</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fff;
            color: #000;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }
        nav {
            display: flex;
            gap: 2rem;
            justify-content: center;
        }
        a {
            text-decoration: none;
            color: #666;
            font-size: 1rem;
            transition: color 0.2s;
        }
        a:hover {
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Driply</h1>
        <nav>
            <a href="frontend/">frontend</a>
            <a href="backend/">backend</a>
            <a href="architecture/">architecture</a>
        </nav>
    </div>
</body>
</html>
